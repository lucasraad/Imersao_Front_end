<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button id="theme-toggle" onclick="toggleTheme()" style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer" aria-label="Alternar tema"></button>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="assets/Perfil_1.png" alt="Um personagem de aparência gótica e caricata, com cabelos roxos e monóculo, posa em um cenário fantástico de miniaturas sombrias iluminadas por velas.">
                                <figcaption>Gustavo</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="assets/Perfil_2.png" alt="Um personagem">
                                <figcaption>Thiago</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="assets/Perfil_3.png" alt="Um personagem">
                                <figcaption>Thamiris</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="assets/Perfil_4.png" alt="Um personagem">
                                <figcaption>Vini</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
    <script src="theme.js"></script>
</body>
</html>
